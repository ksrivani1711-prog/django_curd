<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Employee Details</h1>

    <table border="2">

        <tr>
            <th>emp id</th>
            <th>emp name</th>
            <th>emp email</th>
            <th>emp salary</th>
        </tr>
        {% for x in data %}

        <tr>
            <td>{{x.emp_id}}</td>
            <td>{{x.emp_name}}</td>
            <td>{{x.emp_email}}</td>
            <td>{{x.emp_salary}}</td>

        </tr>
        {% endfor %}

    </table>
    
</body>
</html>
